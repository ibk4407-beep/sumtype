<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>サモナー特性診断</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0b0c10;
    --bg2: #121420;
    --panel: #171a27;
    --line: #2a2e42;
    --gold: #c9a44c;
    --gold-bright: #e8c977;
    --gold-dim: #8a7233;
    --text: #e7e3d6;
    --muted: #8d8a7e;
    --win: #5fb37a;
    --loss: #c25b5b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: radial-gradient(120% 80% at 50% -10%, #1a1c2b 0%, var(--bg) 60%);
    color: var(--text); font-family: "Noto Sans JP", sans-serif; min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 40px 20px 80px; }
  header { text-align: center; margin-bottom: 36px; }
  .eyebrow { font-family: "Cinzel", serif; letter-spacing: .42em; font-size: 11px; color: var(--gold-dim); text-transform: uppercase; }
  h1 { font-family: "Cinzel", serif; font-weight: 900; font-size: clamp(28px, 7vw, 44px);
       margin: 8px 0 6px; color: var(--gold-bright);
       text-shadow: 0 0 24px rgba(201,164,76,.25); }
  .sub { color: var(--muted); font-size: 13px; }

  .search { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; align-items: stretch; margin: 28px 0 14px; }
  .field { display: flex; align-items: center; background: var(--panel); border: 1px solid var(--line);
           border-radius: 10px; overflow: hidden; }
  .field:focus-within { border-color: var(--gold); }
  .field .tag { padding: 0 12px; color: var(--gold); font-family: "Cinzel", serif; font-size: 18px; }
  input { background: transparent; border: 0; color: var(--text); padding: 14px 14px 14px 4px;
          font-size: 15px; outline: none; width: 160px; font-family: inherit; }
  input.tagline { width: 80px; padding-left: 14px; }
  button.go { background: linear-gradient(180deg, var(--gold-bright), var(--gold)); color: #1a1505;
              border: 0; border-radius: 10px; padding: 0 26px; font-family: "Cinzel", serif; font-weight: 700;
              font-size: 16px; letter-spacing: .08em; cursor: pointer; transition: filter .15s; }
  button.go:hover { filter: brightness(1.08); }
  button.go:disabled { opacity: .5; cursor: default; }
  .demo-link { text-align: center; }
  .demo-link button { background: none; border: 0; color: var(--gold-dim); font-size: 12px;
                      text-decoration: underline; cursor: pointer; font-family: inherit; }

  .msg { text-align: center; margin: 30px 0; color: var(--muted); min-height: 20px; }
  .msg.err { color: var(--loss); }
  .spinner { width: 30px; height: 30px; margin: 30px auto; border: 2px solid var(--line);
             border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #result { display: none; }
  #result.show { display: block; animation: rise .5s ease both; }
  @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }

  .id-row { display: flex; align-items: baseline; justify-content: center; gap: 14px; flex-wrap: wrap; margin-bottom: 6px; }
  .id-name { font-family: "Cinzel", serif; font-size: 20px; color: var(--text); }
  .rank-badge { font-family: "Cinzel", serif; font-size: 13px; color: var(--gold); border: 1px solid var(--gold-dim);
                padding: 3px 10px; border-radius: 999px; }

  .type-card { text-align: center; margin: 26px 0 30px; padding: 28px 20px;
               background: linear-gradient(180deg, #1c1e2e, var(--panel)); border: 1px solid var(--line);
               border-radius: 16px; position: relative; overflow: hidden; }
  .type-card::before { content: ""; position: absolute; inset: 0; pointer-events: none;
               background: radial-gradient(60% 60% at 50% 0%, rgba(201,164,76,.14), transparent 70%); }
  .type-card .k { font-family: "Cinzel", serif; letter-spacing: .3em; font-size: 11px; color: var(--gold-dim); }
  .type-card .label { font-family: "Cinzel", serif; font-weight: 900; font-size: clamp(40px, 12vw, 64px);
               color: var(--gold-bright); margin: 6px 0 12px; text-shadow: 0 0 30px rgba(201,164,76,.3); }
  .type-card .blurb { color: var(--text); font-size: 14px; line-height: 1.7; max-width: 460px; margin: 0 auto; }

  .section { margin: 30px 0; }
  .section h2 { font-family: "Cinzel", serif; font-size: 14px; letter-spacing: .2em; color: var(--gold);
                border-bottom: 1px solid var(--line); padding-bottom: 8px; margin: 0 0 18px; }

  .axis { margin: 16px 0; }
  .axis .poles { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .axis .poles b { color: var(--text); font-weight: 500; }
  .track { position: relative; height: 8px; background: var(--bg2); border: 1px solid var(--line);
           border-radius: 999px; }
  .track .mid { position: absolute; left: 50%; top: -3px; bottom: -3px; width: 1px; background: var(--line); }
  .track .marker { position: absolute; top: 50%; width: 14px; height: 14px; border-radius: 50%;
           background: var(--gold-bright); box-shadow: 0 0 12px rgba(201,164,76,.6); transform: translate(-50%, -50%);
           transition: left .8s cubic-bezier(.2,.8,.2,1); }

  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; }
  .stat { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 12px; text-align: center; }
  .stat .v { font-family: "Cinzel", serif; font-size: 22px; color: var(--gold-bright); }
  .stat .l { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .champ { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px;
           background: var(--panel); border: 1px solid var(--line); border-radius: 10px; margin-bottom: 8px; }
  .champ .name { font-weight: 500; }
  .champ .tag2 { font-family: "Cinzel", serif; font-size: 11px; letter-spacing: .1em; padding: 2px 8px;
                 border-radius: 6px; margin-right: 10px; }
  .tag-best { color: var(--win); border: 1px solid var(--win); }
  .tag-worst { color: var(--loss); border: 1px solid var(--loss); }
  .tag-most { color: var(--gold); border: 1px solid var(--gold-dim); }
  .champ .meta { color: var(--muted); font-size: 13px; }
  .champ .wr { color: var(--text); }

  .weak li { color: var(--text); font-size: 14px; line-height: 1.7; margin-bottom: 10px; }
  .weak ul { padding-left: 18px; margin: 0; }

  .note { font-size: 12px; color: var(--muted); text-align: center; margin-top: 26px; line-height: 1.6; }
  footer { text-align: center; color: var(--gold-dim); font-family: "Cinzel", serif; font-size: 11px;
           letter-spacing: .3em; margin-top: 50px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Summoner Analysis</div>
    <h1>サモナー特性診断</h1>
    <p class="sub">直近の戦績から、あなたのプレイスタイルと得意・苦手を読み解きます</p>
  </header>

  <div class="search">
    <div class="field">
      <input id="gameName" placeholder="サモナー名" value="zaccident" autocomplete="off" />
      <span class="tag">#</span>
      <input id="tagLine" class="tagline" placeholder="タグ" value="omg" autocomplete="off" />
    </div>
    <button class="go" id="goBtn" onclick="run()">診断する</button>
  </div>
  <div class="demo-link"><button onclick="renderResult(DEMO_DATA, true)">デモ結果を見る（サンプル）</button></div>

  <div class="msg" id="msg"></div>

  <div id="result">
    <div class="id-row">
      <span class="id-name" id="r-id"></span>
      <span class="rank-badge" id="r-rank" style="display:none"></span>
    </div>

    <div class="type-card">
      <div class="k">YOUR TYPE</div>
      <div class="label" id="r-type"></div>
      <div class="blurb" id="r-blurb"></div>
    </div>

    <div class="section">
      <h2>プレイスタイル</h2>
      <div id="r-axes"></div>
    </div>

    <div class="section">
      <h2>直近の指標</h2>
      <div class="stat-grid" id="r-stats"></div>
    </div>

    <div class="section">
      <h2>得意・苦手ピック</h2>
      <div id="r-champs"></div>
    </div>

    <div class="section weak">
      <h2>伸びしろ</h2>
      <ul id="r-weak"></ul>
    </div>

    <div class="note" id="r-note"></div>
  </div>

  <footer>SUMMONER · ANALYSIS</footer>
</div>

<script>
const AXES = [
  { key: "tempo", lo: "後半型", hi: "序盤型" },
  { key: "role",  lo: "サポート型", hi: "キャリー型" },
  { key: "risk",  lo: "安定型", hi: "ハイリスク型" },
  { key: "pool",  lo: "ジェネラリスト", hi: "スペシャリスト" },
  { key: "macro", lo: "ファイト型", hi: "マクロ型" },
];

async function run() {
  const gameName = document.getElementById("gameName").value.trim();
  const tagLine = document.getElementById("tagLine").value.replace(/^#/, "").trim();
  if (!gameName || !tagLine) { showMsg("サモナー名とタグを入力してください。", true); return; }

  const btn = document.getElementById("goBtn");
  btn.disabled = true;
  document.getElementById("result").classList.remove("show");
  showSpinner();

  if (location.protocol === "file:") {
    showMsg("ローカルファイル（file://）では動きません。Netlify のサイトURLを開いてください。", true);
    btn.disabled = false; return;
  }

  try {
    const url = `/.netlify/functions/analyze?gameName=${encodeURIComponent(gameName)}&tagLine=${encodeURIComponent(tagLine)}`;
    const res = await fetch(url);
    const ct = res.headers.get("content-type") || "";

    if (!ct.includes("json")) {
      if (res.status === 404) {
        showMsg("Function が見つかりません（404）。リポジトリ直下に index.html・netlify.toml・netlify/ が並んでいるか確認してください。", true);
      } else {
        showMsg(`サーバー応答を解釈できませんでした（HTTP ${res.status}）。Netlify の Functions デプロイ状態を確認してください。`, true);
      }
      return;
    }

    const data = await res.json();
    if (!res.ok || data.error) { showMsg(data.error || `取得に失敗しました（HTTP ${res.status}）`, true); return; }
    clearMsg();
    renderResult(data, false);
  } catch (e) {
    showMsg("通信に失敗しました。Netlify のサイトURLを開いているか、ネットワークを確認してください。", true);
  } finally {
    btn.disabled = false;
  }
}

function renderResult(d, isDemo) {
  clearMsg();
  document.getElementById("r-id").textContent = d.riotId;

  const rankEl = document.getElementById("r-rank");
  if (d.rank && d.rank.tier) {
    rankEl.style.display = "";
    rankEl.textContent = `${cap(d.rank.tier)} ${d.rank.division || ""} · ${d.rank.lp}LP`;
  } else { rankEl.style.display = "none"; }

  document.getElementById("r-type").textContent = d.type.label;
  document.getElementById("r-blurb").textContent = d.type.blurb;

  // 軸
  const axW = document.getElementById("r-axes");
  axW.innerHTML = "";
  AXES.forEach((ax) => {
    const v = d.axes[ax.key] ?? 50;
    const el = document.createElement("div");
    el.className = "axis";
    el.innerHTML = `
      <div class="poles"><span class="${v<45?'':''}">${v<45?'<b>'+ax.lo+'</b>':ax.lo}</span>
        <span>${v>55?'<b>'+ax.hi+'</b>':ax.hi}</span></div>
      <div class="track"><div class="mid"></div><div class="marker" style="left:0%"></div></div>`;
    axW.appendChild(el);
    requestAnimationFrame(() => { el.querySelector(".marker").style.left = v + "%"; });
  });

  // 指標
  const s = d.stats;
  const stats = [
    [s.kda, "KDA"], [Math.round(d.winrate*100)+"%", "勝率"],
    [(s.killParticipation*100).toFixed(0)+"%", "キル関与"],
    [(s.damageShare*100).toFixed(0)+"%", "ダメージ占有"],
    [s.csPerMin, "CS/分"], [s.visionPerMin, "視界/分"],
    [s.avgGameMin+"分", "平均試合"], [d.sampleSize, "解析試合数"],
  ];
  document.getElementById("r-stats").innerHTML = stats.map(([v,l]) =>
    `<div class="stat"><div class="v">${v}</div><div class="l">${l}</div></div>`).join("");

  // チャンピオン
  const cw = document.getElementById("r-champs");
  cw.innerHTML = "";
  const rows = [];
  if (d.champions.best) rows.push(["tag-best","得意", d.champions.best]);
  if (d.champions.worst && (!d.champions.best || d.champions.worst.champion !== d.champions.best.champion))
    rows.push(["tag-worst","苦手", d.champions.worst]);
  (d.champions.mostPlayed||[]).slice(0,3).forEach(c => rows.push(["tag-most","最多", c]));
  const seen = new Set();
  rows.forEach(([cls,lbl,c]) => {
    const k = lbl+c.champion; if (seen.has(k)) return; seen.add(k);
    cw.innerHTML += `<div class="champ">
      <div class="name"><span class="tag2 ${cls}">${lbl}</span>${c.champion}</div>
      <div class="meta">${c.games}戦 · <span class="wr">勝率 ${Math.round(c.winrate*100)}%</span></div></div>`;
  });

  // 伸びしろ
  document.getElementById("r-weak").innerHTML = (d.weaknesses||[]).map(w => `<li>${w}</li>`).join("");

  document.getElementById("r-note").textContent = isDemo
    ? "※ これはサンプルデータによるデモ表示です。実データには Riot APIキーの設定とデプロイが必要です。"
    : "※ 直近のサモナーズリフトの試合をもとに算出。各軸のしきい値は今後の調整で精度が上がります。";

  document.getElementById("result").classList.add("show");
  document.getElementById("result").scrollIntoView({ behavior: "smooth", block: "start" });
}

function showMsg(t, err){ const m=document.getElementById("msg"); m.innerHTML=t; m.className="msg"+(err?" err":""); }
function clearMsg(){ document.getElementById("msg").innerHTML=""; }
function showSpinner(){ document.getElementById("msg").innerHTML='<div class="spinner"></div>'; }
function cap(s){ return s ? s.charAt(0)+s.slice(1).toLowerCase() : s; }

// --- デモ用サンプルデータ（ジャングルメイン想定の架空数値） ---
const DEMO_DATA = {
  riotId: "zaccident#omg",
  rank: { tier: "MASTER", division: "", lp: 142 },
  sampleSize: 24, winrate: 0.583, mainRole: "JUNGLE",
  stats: { kda: 3.41, avgKills: 6.2, avgDeaths: 5.1, avgAssists: 11.2,
    killParticipation: 0.68, damageShare: 0.21, csPerMin: 5.4, visionPerMin: 0.92, avgGameMin: 28.6 },
  axes: { tempo: 71, role: 58, risk: 62, pool: 74, macro: 47 },
  type: { label: "専心", blurb: "限られた得意ピックを深く極めるスペシャリスト型。" },
  champions: {
    mostPlayed: [{champion:"Vi",games:13,winrate:0.615},{champion:"JarvanIV",games:5,winrate:0.6},{champion:"Nocturne",games:3,winrate:0.333}],
    best: {champion:"Vi",games:13,winrate:0.615},
    worst: {champion:"Nocturne",games:3,winrate:0.333},
    uniqueChamps: 5,
  },
  weaknesses: [
    "視界スコアが低め。コントロールワードと敵ジャングルの視界管理を増やすとマップ判断が安定します。",
    "オブジェクト関与がやや少なめ。ドラゴン/ヘラルド前のセットアップを早めに意識すると勝率が伸びます。",
  ],
};
</script>
</body>
</html>
