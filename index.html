<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>サモナー特性診断</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:#0b0c10; --bg2:#121420; --panel:#171a27; --line:#2a2e42;
    --gold:#c9a44c; --gold-bright:#e8c977; --gold-dim:#8a7233;
    --text:#e7e3d6; --muted:#8d8a7e; --win:#5fb37a; --loss:#c25b5b;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:radial-gradient(120% 80% at 50% -10%, #1a1c2b 0%, var(--bg) 60%);
    color:var(--text); font-family:"Noto Sans JP",sans-serif; min-height:100vh; -webkit-font-smoothing:antialiased; }
  .wrap { max-width:760px; margin:0 auto; padding:40px 20px 80px; }
  header { text-align:center; margin-bottom:36px; }
  .eyebrow { font-family:"Cinzel",serif; letter-spacing:.42em; font-size:11px; color:var(--gold-dim); text-transform:uppercase; }
  h1 { font-family:"Cinzel",serif; font-weight:900; font-size:clamp(28px,7vw,44px); margin:8px 0 6px;
    color:var(--gold-bright); text-shadow:0 0 24px rgba(201,164,76,.25); }
  .sub { color:var(--muted); font-size:13px; }

  .search { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; align-items:stretch; margin:28px 0 14px; }
  .field { display:flex; align-items:center; background:var(--panel); border:1px solid var(--line); border-radius:10px; overflow:hidden; }
  .field:focus-within { border-color:var(--gold); }
  .field .tag { padding:0 12px; color:var(--gold); font-family:"Cinzel",serif; font-size:18px; }
  input { background:transparent; border:0; color:var(--text); padding:14px 14px 14px 4px; font-size:15px; outline:none; width:160px; font-family:inherit; }
  input.tagline { width:80px; padding-left:14px; }
  button.go { background:linear-gradient(180deg,var(--gold-bright),var(--gold)); color:#1a1505; border:0; border-radius:10px;
    padding:0 26px; font-family:"Cinzel",serif; font-weight:700; font-size:16px; letter-spacing:.08em; cursor:pointer; transition:filter .15s; }
  button.go:hover { filter:brightness(1.08); }
  button.go:disabled { opacity:.5; cursor:default; }
  .demo-link { text-align:center; }
  .demo-link button { background:none; border:0; color:var(--gold-dim); font-size:12px; text-decoration:underline; cursor:pointer; font-family:inherit; }

  .msg { text-align:center; margin:30px 0; color:var(--muted); min-height:20px; }
  .msg.err { color:var(--loss); }
  .spinner { width:30px; height:30px; margin:30px auto; border:2px solid var(--line); border-top-color:var(--gold); border-radius:50%; animation:spin 1s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  #result { display:none; }
  #result.show { display:block; animation:rise .5s ease both; }
  @keyframes rise { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:none; } }

  .id-row { display:flex; align-items:baseline; justify-content:center; gap:14px; flex-wrap:wrap; margin-bottom:6px; }
  .id-name { font-family:"Cinzel",serif; font-size:20px; color:var(--text); }
  .rank-badge { font-family:"Cinzel",serif; font-size:13px; color:var(--gold); border:1px solid var(--gold-dim); padding:3px 10px; border-radius:999px; }

  .type-card { text-align:center; margin:22px 0 26px; padding:28px 20px; background:linear-gradient(180deg,#1c1e2e,var(--panel));
    border:1px solid var(--line); border-radius:16px; position:relative; overflow:hidden; }
  .type-card::before { content:""; position:absolute; inset:0; pointer-events:none; background:radial-gradient(60% 60% at 50% 0%, rgba(201,164,76,.14), transparent 70%); }
  .type-card .k { font-family:"Cinzel",serif; letter-spacing:.3em; font-size:11px; color:var(--gold-dim); }
  .type-card .label { font-family:"Cinzel",serif; font-weight:900; font-size:clamp(40px,12vw,64px); color:var(--gold-bright); margin:6px 0 12px; text-shadow:0 0 30px rgba(201,164,76,.3); }
  .type-card .blurb { color:var(--text); font-size:14px; line-height:1.7; max-width:460px; margin:0 auto; }

  .toggle { display:flex; justify-content:center; gap:6px; margin:0 0 26px; }
  .toggle button { background:var(--panel); border:1px solid var(--line); color:var(--muted); font-family:inherit;
    font-size:13px; padding:8px 16px; border-radius:999px; cursor:pointer; transition:all .15s; }
  .toggle button.active { color:#1a1505; background:linear-gradient(180deg,var(--gold-bright),var(--gold)); border-color:var(--gold); font-weight:700; }
  .toggle button:disabled { opacity:.35; cursor:default; }

  .section { margin:30px 0; }
  .section h2 { font-family:"Cinzel",serif; font-size:14px; letter-spacing:.2em; color:var(--gold); border-bottom:1px solid var(--line); padding-bottom:8px; margin:0 0 18px; }
  .empty { color:var(--muted); font-size:13px; }

  .axis { margin:16px 0; }
  .axis .poles { display:flex; justify-content:space-between; font-size:12px; margin-bottom:6px; }
  .pole { color:var(--muted); }
  .pole.dom { color:var(--text); font-weight:600; }
  .tip { border-bottom:1px dotted var(--gold-dim); cursor:help; }
  #tooltip { position:absolute; z-index:50; display:none; max-width:260px; padding:10px 12px; background:#1d2030;
    border:1px solid var(--gold-dim); border-radius:8px; color:var(--text); font-size:12px; line-height:1.6; box-shadow:0 8px 24px rgba(0,0,0,.5); pointer-events:none; }
  .track { position:relative; height:8px; background:var(--bg2); border:1px solid var(--line); border-radius:999px; }
  .track .mid { position:absolute; left:50%; top:-3px; bottom:-3px; width:1px; background:var(--line); }
  .track .marker { position:absolute; top:50%; width:14px; height:14px; border-radius:50%; background:var(--gold-bright);
    box-shadow:0 0 12px rgba(201,164,76,.6); transform:translate(-50%,-50%); transition:left .8s cubic-bezier(.2,.8,.2,1); }

  .stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(110px,1fr)); gap:10px; }
  .stat { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:12px; text-align:center; }
  .stat .v { font-family:"Cinzel",serif; font-size:22px; color:var(--gold-bright); }
  .stat .l { font-size:11px; color:var(--muted); margin-top:4px; }

  .row { display:flex; align-items:center; justify-content:space-between; padding:12px 14px; background:var(--panel);
    border:1px solid var(--line); border-radius:10px; margin-bottom:8px; }
  .row .name { font-weight:500; }
  .row .tag2 { font-family:"Cinzel",serif; font-size:11px; letter-spacing:.1em; padding:2px 8px; border-radius:6px; margin-right:10px; }
  .tag-best { color:var(--win); border:1px solid var(--win); }
  .tag-worst { color:var(--loss); border:1px solid var(--loss); }
  .tag-most { color:var(--gold); border:1px solid var(--gold-dim); }
  .row .meta { color:var(--muted); font-size:13px; }
  .row .wr { color:var(--text); }

  .mastery-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:8px; }
  .mastery { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:10px 12px; }
  .mastery .mname { font-weight:500; font-size:14px; }
  .mastery .mmeta { color:var(--muted); font-size:12px; margin-top:3px; }
  .mastery .lvl { color:var(--gold); }

  .weak li { color:var(--text); font-size:14px; line-height:1.7; margin-bottom:10px; }
  .weak ul { padding-left:18px; margin:0; }

  .note { font-size:12px; color:var(--muted); text-align:center; margin-top:26px; line-height:1.6; }
  footer { text-align:center; color:var(--gold-dim); font-family:"Cinzel",serif; font-size:11px; letter-spacing:.3em; margin-top:50px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Summoner Analysis</div>
    <h1>サモナー特性診断</h1>
    <p class="sub">直近の戦績から、あなたのプレイスタイルと得意・苦手を読み解きます</p>
  </header>

  <div class="search">
    <div class="field">
      <input id="gameName" placeholder="サモナー名" value="zaccident" autocomplete="off" />
      <span class="tag">#</span>
      <input id="tagLine" class="tagline" placeholder="タグ" value="omg" autocomplete="off" />
    </div>
    <button class="go" id="goBtn" onclick="run()">診断する</button>
  </div>
  <div class="demo-link"><button onclick="renderResult(DEMO_DATA, true)">デモ結果を見る（サンプル）</button></div>

  <div class="msg" id="msg"></div>

  <div id="result">
    <div class="id-row">
      <span class="id-name" id="r-id"></span>
      <span class="rank-badge" id="r-rank" style="display:none"></span>
    </div>

    <div class="toggle" id="r-toggle"></div>

    <div class="type-card">
      <div class="k">YOUR TYPE</div>
      <div class="label" id="r-type"></div>
      <div class="blurb" id="r-blurb"></div>
    </div>

    <div class="section"><h2>プレイスタイル</h2><div id="r-axes"></div></div>
    <div class="section"><h2>直近の指標</h2><div class="stat-grid" id="r-stats"></div></div>
    <div class="section"><h2>得意・苦手ピック</h2><div id="r-champs"></div></div>
    <div class="section weak"><h2>伸びしろ</h2><ul id="r-weak"></ul></div>
    <div class="section"><h2>チャンピオンマスタリー</h2><div class="mastery-grid" id="r-mastery"></div></div>

    <div class="note" id="r-note"></div>
  </div>

  <footer>SUMMONER · ANALYSIS</footer>
</div>

<script>
const AXES = [
  { key:"tempo", lo:"後半型", hi:"序盤型",
    loDesc:"序盤は無理をせず、中盤以降のスケールやチームの完成度で勝ちにいく傾向。試合が長引いても腐りにくい。",
    hiDesc:"序盤から主導権を握り、相手が整う前にリードを作って試合を早く畳む傾向。15分前のキル関与が多く、試合時間が短め。" },
  { key:"role", lo:"サポート型", hi:"キャリー型",
    loDesc:"火力より視界づくりや味方の補助で貢献するタイプ。視界スコアが高く、ダメージ占有は低め。",
    hiDesc:"チームの火力を多く担い、自分のダメージで試合を決めにいくタイプ。チーム内ダメージ占有率が高い。" },
  { key:"risk", lo:"安定型", hi:"ハイリスク型",
    loDesc:"無理な仕掛けを避け、崩れにくい一貫した試合運び。デスが少なく、成績のブレも小さい。",
    hiDesc:"大きな見返りを狙って踏み込むタイプ。試合を動かす一方でデスは増えがちで、成績のブレも大きい。" },
  { key:"pool", lo:"ジェネラリスト", hi:"スペシャリスト",
    loDesc:"相手や状況に合わせて幅広くチャンピオンを持ち替えるタイプ。使用チャンプの種類が多く、対応力で勝つ。",
    hiDesc:"少数の得意チャンピオンを深く使い込むタイプ。同じチャンプの試行が多く、習熟度で勝つ。" },
  { key:"macro", lo:"ファイト型", hi:"マクロ型",
    loDesc:"撃ち合いや集団戦での戦闘貢献で存在感を出すタイプ。キル数が多め。",
    hiDesc:"キルより、ドラゴン・ヘラルド・タワーといったオブジェクトとマップ全体の優位で勝ちにいくタイプ。" },
];
const BUCKETS = [["all","全体"],["ranked","ランク"],["normal","ノーマル"]];
const ROLE_JP = { TOP:"トップ", JUNGLE:"ジャングル", MIDDLE:"ミッド", BOTTOM:"ボット", UTILITY:"サポート" };

let CURRENT = null, CURBUCKET = "all", CUR_DEMO = false;

async function run() {
  let gameName = document.getElementById("gameName").value.trim();
  let tagLine = document.getElementById("tagLine").value.replace(/^#/, "").trim();
  if (gameName.includes("#")) {
    const i = gameName.indexOf("#");
    if (!tagLine) tagLine = gameName.slice(i + 1).replace(/#/g, "").trim();
    gameName = gameName.slice(0, i).trim();
  }
  if (!gameName || !tagLine) { showMsg("サモナー名とタグを入力してください。", true); return; }

  const btn = document.getElementById("goBtn");
  btn.disabled = true;
  document.getElementById("result").classList.remove("show");
  showSpinner();

  if (location.protocol === "file:") { showMsg("ローカルファイル（file://）では動きません。Netlify のサイトURLを開いてください。", true); btn.disabled = false; return; }

  try {
    const url = `/.netlify/functions/analyze?gameName=${encodeURIComponent(gameName)}&tagLine=${encodeURIComponent(tagLine)}`;
    const res = await fetch(url);
    const ct = res.headers.get("content-type") || "";
    if (!ct.includes("json")) {
      if (res.status === 404) showMsg("Function が見つかりません（404）。リポジトリ直下に index.html・netlify.toml・netlify/ が並んでいるか確認してください。", true);
      else showMsg(`サーバー応答を解釈できませんでした（HTTP ${res.status}）。Netlify の Functions デプロイ状態を確認してください。`, true);
      return;
    }
    const data = await res.json();
    if (!res.ok || data.error) { showMsg(data.error || `取得に失敗しました（HTTP ${res.status}）`, true); return; }
    clearMsg();
    renderResult(data, false);
  } catch (e) {
    showMsg("通信に失敗しました。Netlify のサイトURLを開いているか、ネットワークを確認してください。", true);
  } finally {
    btn.disabled = false;
  }
}

function renderResult(d, isDemo) {
  clearMsg();
  CURRENT = d; CUR_DEMO = isDemo;
  document.getElementById("r-id").textContent = d.riotId;

  const rankEl = document.getElementById("r-rank");
  if (d.rank && d.rank.tier) { rankEl.style.display = ""; rankEl.textContent = `${cap(d.rank.tier)} ${d.rank.division || ""} · ${d.rank.lp}LP`; }
  else { rankEl.style.display = "none"; }

  // キュー切替（試合のあるバケットだけ）
  CURBUCKET = (d.buckets.ranked && d.buckets.ranked.sampleSize > 0) ? "ranked" : "all";
  const tg = document.getElementById("r-toggle");
  tg.innerHTML = "";
  BUCKETS.forEach(([key, label]) => {
    const b = d.buckets[key]; const has = b && b.sampleSize > 0;
    const btn = document.createElement("button");
    btn.textContent = `${label}${has ? `（${b.sampleSize}）` : ""}`;
    btn.disabled = !has;
    if (key === CURBUCKET) btn.classList.add("active");
    btn.onclick = () => { CURBUCKET = key; [...tg.children].forEach((c) => c.classList.remove("active")); btn.classList.add("active"); renderBucket(); };
    tg.appendChild(btn);
  });

  renderMastery(d.mastery);
  renderBucket();

  document.getElementById("result").classList.add("show");
  document.getElementById("result").scrollIntoView({ behavior:"smooth", block:"start" });
}

function renderBucket() {
  const b = CURRENT.buckets[CURBUCKET];
  const note = document.getElementById("r-note");
  if (!b || b.sampleSize === 0) {
    document.getElementById("r-type").textContent = "—";
    document.getElementById("r-blurb").textContent = "このキューの試合がありません。";
    ["r-axes","r-stats","r-champs"].forEach((id) => document.getElementById(id).innerHTML = "");
    document.getElementById("r-weak").innerHTML = "";
    note.textContent = "";
    return;
  }

  document.getElementById("r-type").textContent = b.type.label;
  document.getElementById("r-blurb").textContent = b.type.blurb;

  // 軸
  const axW = document.getElementById("r-axes");
  axW.innerHTML = "";
  AXES.forEach((ax) => {
    const v = b.axes[ax.key] ?? 50;
    const el = document.createElement("div");
    el.className = "axis";
    el.innerHTML = `
      <div class="poles">
        <span class="pole tip ${v<45?'dom':''}" data-tip="${ax.loDesc}">${ax.lo}</span>
        <span class="pole tip ${v>55?'dom':''}" data-tip="${ax.hiDesc}">${ax.hi}</span>
      </div>
      <div class="track"><div class="mid"></div><div class="marker" style="left:0%"></div></div>`;
    axW.appendChild(el);
    requestAnimationFrame(() => { el.querySelector(".marker").style.left = v + "%"; });
  });

  // 指標
  const s = b.stats;
  const stats = [
    [s.kda,"KDA"], [Math.round(b.winrate*100)+"%","勝率"],
    [(s.killParticipation*100).toFixed(0)+"%","キル関与"], [(s.damageShare*100).toFixed(0)+"%","ダメージ占有"],
    [s.csPerMin,"CS/分"], [s.visionPerMin,"視界/分"], [s.avgGameMin+"分","平均試合"], [b.sampleSize,"解析試合数"],
  ];
  document.getElementById("r-stats").innerHTML = stats.map(([v,l]) => `<div class="stat"><div class="v">${v}</div><div class="l">${l}</div></div>`).join("");

  // 得意・苦手ピック
  const cw = document.getElementById("r-champs");
  cw.innerHTML = "";
  const rows = [];
  if (b.champions.best) rows.push(["tag-best","得意",b.champions.best]);
  if (b.champions.worst && (!b.champions.best || b.champions.worst.champion !== b.champions.best.champion)) rows.push(["tag-worst","苦手",b.champions.worst]);
  (b.champions.mostPlayed||[]).slice(0,3).forEach((c) => rows.push(["tag-most","最多",c]));
  const seen = new Set();
  rows.forEach(([cls,lbl,c]) => {
    const k = lbl+c.champion; if (seen.has(k)) return; seen.add(k);
    cw.innerHTML += `<div class="row"><div class="name"><span class="tag2 ${cls}">${lbl}</span>${c.champion}</div>
      <div class="meta">${c.games}戦 · <span class="wr">勝率 ${Math.round(c.winrate*100)}%</span></div></div>`;
  });

  // 伸びしろ
  document.getElementById("r-weak").innerHTML = (b.weaknesses||[]).map((w) => `<li>${w}</li>`).join("");

  const roleJP = ROLE_JP[b.mainRole] || "全ロール";
  const label = BUCKETS.find(([k]) => k===CURBUCKET)[1];
  note.textContent = CUR_DEMO
    ? "※ これはサンプルデータによるデモ表示です。実データには Riot APIキーの設定とデプロイが必要です。"
    : `※ ${label}の直近${b.sampleSize}試合を、${roleJP}の基準値で正規化して算出しています。`;
}

function renderMastery(mastery) {
  const w = document.getElementById("r-mastery");
  if (!mastery || mastery.length === 0) { w.innerHTML = `<div class="empty">マスタリー情報を取得できませんでした。</div>`; return; }
  w.innerHTML = mastery.map((m) => `<div class="mastery"><div class="mname">${m.name}</div>
    <div class="mmeta"><span class="lvl">Lv.${m.level}</span> · ${Number(m.points).toLocaleString()} pts</div></div>`).join("");
}

function showMsg(t, err){ const m=document.getElementById("msg"); m.innerHTML=t; m.className="msg"+(err?" err":""); }
function clearMsg(){ document.getElementById("msg").innerHTML=""; }
function showSpinner(){ document.getElementById("msg").innerHTML='<div class="spinner"></div>'; }
function cap(s){ return s ? s.charAt(0)+s.slice(1).toLowerCase() : s; }

// --- ツールチップ（PCはホバー、スマホはタップ） ---
const tipEl = document.createElement("div"); tipEl.id = "tooltip"; document.body.appendChild(tipEl);
function showTip(t) {
  const txt = t.getAttribute("data-tip"); if (!txt) return;
  tipEl.textContent = txt; tipEl.style.display = "block";
  const r = t.getBoundingClientRect(); const vw = document.documentElement.clientWidth;
  let left = r.left + r.width/2 - tipEl.offsetWidth/2 + window.scrollX;
  left = Math.max(8+window.scrollX, Math.min(left, window.scrollX + vw - tipEl.offsetWidth - 8));
  let top = r.top + window.scrollY - tipEl.offsetHeight - 8;
  if (r.top - tipEl.offsetHeight - 8 < 0) top = r.bottom + window.scrollY + 8;
  tipEl.style.left = left + "px"; tipEl.style.top = top + "px";
}
function hideTip(){ tipEl.style.display = "none"; tipEl._for = null; }
document.addEventListener("mouseover", (e) => { const t = e.target.closest("[data-tip]"); if (t) showTip(t); });
document.addEventListener("mouseout", (e) => { const t = e.target.closest("[data-tip]"); if (t) hideTip(); });
document.addEventListener("click", (e) => {
  const t = e.target.closest("[data-tip]");
  if (t) { if (tipEl.style.display === "block" && tipEl._for === t) hideTip(); else { showTip(t); tipEl._for = t; } }
  else hideTip();
});
window.addEventListener("scroll", hideTip, { passive:true });

// --- Riot ID 自動分割 + Enter ---
const gnEl = document.getElementById("gameName"), tlEl = document.getElementById("tagLine");
gnEl.addEventListener("input", () => {
  if (gnEl.value.includes("#")) {
    const i = gnEl.value.indexOf("#");
    const tag = gnEl.value.slice(i+1).replace(/#/g,"").trim();
    gnEl.value = gnEl.value.slice(0,i).trim();
    if (tag) { tlEl.value = tag; tlEl.focus(); }
  }
});
[gnEl, tlEl].forEach((el) => el.addEventListener("keydown", (e) => { if (e.key === "Enter") run(); }));

// --- デモ用サンプルデータ（ジャングルメイン想定の架空数値） ---
const DEMO_DATA = {
  riotId: "zaccident#omg",
  rank: { tier:"MASTER", division:"", lp:142 },
  mastery: [
    { name:"Vi", level:9, points:352140 }, { name:"JarvanIV", level:7, points:98220 },
    { name:"Nocturne", level:6, points:54110 }, { name:"LeeSin", level:5, points:31980 },
  ],
  buckets: {
    all: {
      sampleSize:42, winrate:0.571, mainRole:"JUNGLE",
